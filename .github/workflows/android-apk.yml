name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
    paths:
      - "MotocareMobile/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-android-apk:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MotocareMobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: MotocareMobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build APK on EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -e
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is missing. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

          eas build --platform android --profile preview --non-interactive --json > eas-build.json

      - name: Show build result
        run: |
          BUILD_ID=$(node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('eas-build.json','utf8'));console.log(Array.isArray(d)?d[0].id:d.id)")
          BUILD_URL=$(node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('eas-build.json','utf8'));console.log(Array.isArray(d)?d[0].webUrl:d.webUrl)")

          echo "Build ID: $BUILD_ID"
          echo "Build URL: $BUILD_URL"

          {
            echo "## Android APK Build";
            echo "- Build ID: $BUILD_ID";
            echo "- Build URL: $BUILD_URL";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-metadata
          path: MotocareMobile/eas-build.json
          retention-days: 7
